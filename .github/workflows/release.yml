name: Release Tauri binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: ubuntu-22.04, target: 'linux' }
          - { os: macos-14, target: 'macos' }
          - { os: windows-latest, target: 'windows' }
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux deps
        if: matrix.platform.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OpenBLS ${{ github.ref_name }}'
          releaseBody: |
            Pre-release build of OpenBLS. See [README](https://github.com/gndl00p/openbls#readme) and [DISCLAIMER](https://github.com/gndl00p/openbls/blob/main/DISCLAIMER.md) before use.

            ## Artifacts
            - Linux: `.deb` and `.AppImage`
            - macOS: `.dmg` (unsigned — Right-click → Open on first run)
            - Windows: `.msi`

            ## Web build
            Hosted SPA: https://gndl00p.github.io/openbls (requires GitHub Pages enable)
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
